version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chromascreen_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./temp_jobs:/app/temp_jobs
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: chromascreen_worker
    volumes:
      - ./backend:/app
      - ./temp_jobs:/app/temp_jobs
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: chromascreen_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    stdin_open: true
    tty: true

  redis:
    image: redis:alpine
    container_name: chromascreen_redis
    ports:
      - "6379:6379"

volumes:
  temp_jobs:
