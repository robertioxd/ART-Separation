services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./worker:/app/worker
      - ./temp_jobs:/app/temp_jobs
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    volumes:
      - ./backend:/app/backend
      - ./worker:/app/worker
      - ./temp_jobs:/app/temp_jobs
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    # Using 'solo' pool to avoid issues with some libraries in dev
    command: celery -A worker.celery_app worker --loglevel=info --pool=solo

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host"
